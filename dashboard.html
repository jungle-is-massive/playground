<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jungle — Agency Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#F5F2EB; --black:#111110; --green:#8BFF57;
  --green-bg:rgba(139,255,87,0.1); --green-border:rgba(139,255,87,0.25);
  --grey:#7A7972; --grey-light:#E8E5DC; --grey-mid:#CFCCC3;
  --border:rgba(17,17,16,0.09); --border-strong:rgba(17,17,16,0.2);
  --red:#FF4D4D; --amber:#F5A623; --blue:#4A90D9;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--black);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

/* NAV */
nav{position:sticky;top:0;z-index:300;background:var(--black);display:flex;align-items:center;gap:0;height:52px}
.nav-logo{font-size:17px;font-weight:500;letter-spacing:-.5px;color:#fff;padding:0 1.5rem;border-right:1px solid rgba(255,255,255,.08);height:100%;display:flex;align-items:center;gap:0;white-space:nowrap}
.nav-logo span{color:var(--green)}
.nav-tabs{display:flex;height:100%;flex:1}
.nav-tab{padding:0 1.25rem;font-size:13px;color:rgba(255,255,255,.45);cursor:pointer;display:flex;align-items:center;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.nav-tab:hover{color:rgba(255,255,255,.8)}
.nav-tab.active{color:#fff;border-bottom-color:var(--green)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;padding:0 1.5rem}
.live-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.4)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.last-sync{font-size:11px;color:rgba(255,255,255,.25)}
.btn-sm{font-family:inherit;font-size:11px;font-weight:500;color:var(--black);background:var(--green);border:none;border-radius:20px;padding:5px 12px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-sm:hover{opacity:.85}
.btn-sm:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost-sm{font-family:inherit;font-size:11px;color:rgba(255,255,255,.5);background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;cursor:pointer;transition:all .15s;text-decoration:none;display:flex;align-items:center}
.btn-ghost-sm:hover{color:#fff;border-color:rgba(255,255,255,.35)}

/* WRAP */
.wrap{max-width:1240px;margin:0 auto;padding:1.5rem 2rem 4rem}

/* PANELS */
.panel{display:none}
.panel.active{display:block}

/* METRICS STRIP */
.metrics{display:flex;background:var(--black);border-radius:10px;overflow:hidden;margin-bottom:1.75rem}
.metric{flex:1;padding:16px 20px;border-right:1px solid rgba(255,255,255,.06)}
.metric:last-child{border-right:none}
.metric-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.35);margin-bottom:5px}
.metric-val{font-size:22px;font-weight:300;letter-spacing:-.8px;color:#fff}
.metric-val strong{font-weight:500}
.metric-val .g{color:var(--green)}
.metric-val .r{color:var(--red)}
.metric-sub{font-size:11px;color:rgba(255,255,255,.25);margin-top:2px}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.pill{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border-strong);background:transparent;color:var(--grey);cursor:pointer;transition:all .12s;font-family:inherit}
.pill:hover{border-color:var(--black);color:var(--black)}
.pill.active{background:var(--black);color:var(--green);border-color:var(--black)}
.search-wrap{margin-left:auto;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.3;pointer-events:none}
.search{font-family:inherit;font-size:12px;padding:6px 12px 6px 32px;border:1px solid var(--border-strong);border-radius:20px;background:transparent;color:var(--black);width:200px;outline:none;transition:border-color .12s}
.search:focus{border-color:var(--black)}
.search::placeholder{color:var(--grey)}

/* JOB CARDS — Pipeline */
.pipeline-grid{display:flex;flex-direction:column;gap:8px}

.job-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .12s; margin-bottom:10px;}
.job-card:hover{border-color:var(--border-strong)}

.job-card-header{display:grid;grid-template-columns:1fr 110px 100px 130px 90px 32px;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
.job-name-cell .jname{font-size:13px;font-weight:500;color:var(--black);line-height:1.25}
.job-name-cell .jclient{font-size:11px;color:var(--grey);margin-top:1px}
.job-value{font-size:13px;font-weight:500;color:var(--black);text-align:right}
.job-value.missing{color:var(--grey-mid);font-style:italic;font-weight:400;font-size:11px}
.job-handler{font-size:12px;color:var(--grey)}
.job-due{font-size:11px;color:var(--grey)}
.job-due.overdue{color:var(--red);font-weight:500}
.job-due.soon{color:var(--amber);font-weight:500}

.status-pill{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;display:inline-block;white-space:nowrap}
.st-live{background:#D8FFB8;color:#2A6000}
.st-quote{background:#FFF0D0;color:#8A4500}
.st-onhold{background:#FFE0E0;color:#8A0000}

.therm-wrap{display:flex;align-items:center;gap:6px;min-width:80px}
.therm-bar{flex:1;height:3px;background:var(--grey-light);border-radius:2px;overflow:hidden}
.therm-fill{height:100%;border-radius:2px;background:var(--green)}
.therm-fill.warn{background:var(--amber)}
.therm-fill.danger{background:var(--red)}
.therm-pct{font-size:10px;color:var(--grey);white-space:nowrap;min-width:26px;text-align:right}

.chevron{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--grey-mid);transition:transform .2s;flex-shrink:0}
.job-card.open .chevron{transform:rotate(90deg)}

/* EXPAND PANEL */
.job-detail{display:none;border-top:1px solid var(--border);padding:16px 18px;background:#fafaf8}
.job-card.open .job-detail{display:block}

.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.detail-item{font-size:11px}
.detail-label{color:var(--grey);text-transform:uppercase;letter-spacing:.5px;font-size:9px;font-weight:600;margin-bottom:3px}
.detail-val{font-size:13px;font-weight:500;color:var(--black)}
.detail-val.muted{color:var(--grey);font-weight:400;font-style:italic}

.activities-section{margin-top:12px}
.activities-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--grey);margin-bottom:8px}
.activity-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.activity-row:last-child{border-bottom:none}
.act-subject{flex:1;color:var(--black);font-weight:500}
.act-owner{color:var(--grey);min-width:120px}
.act-due{color:var(--grey);min-width:80px;text-align:right}
.act-due.overdue{color:var(--red)}
.act-complete{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--grey-mid);flex-shrink:0}
.act-complete.done{background:var(--green);border-color:var(--green)}
.no-activities{font-size:12px;color:var(--grey);font-style:italic}

.loading-detail{font-size:12px;color:var(--grey);padding:8px 0;font-style:italic}

/* CLIENT-GROUPED — Existing Clients */
.client-block{margin-bottom:10px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff}
.client-block:hover{border-color:var(--border-strong)}
.client-header{display:flex;align-items:center;padding:14px 18px;cursor:pointer;gap:12px;user-select:none;background:#fff;border-bottom:1px solid transparent;transition:background .12s}
.client-block.open .client-header{border-bottom-color:var(--border);background:#fafaf8}
.ch-chevron{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--grey-mid);transition:transform .2s}
.client-block.open .ch-chevron{transform:rotate(90deg)}
.ch-name{font-size:15px;font-weight:500;letter-spacing:-.3px;flex:1}
.ch-meta{display:flex;gap:18px;align-items:center;margin-left:auto;flex-shrink:0}
.ch-stat{font-size:11px;color:var(--grey);white-space:nowrap}
.ch-stat strong{font-size:13px;font-weight:500;color:var(--black)}

.jobs-list{display:none}
.client-block.open .jobs-list{display:block}

.jobs-list-header{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--grey);padding:8px 18px;display:grid;grid-template-columns:1fr 160px 90px 110px 80px;gap:10px;background:#fafaf8;border-bottom:1px solid var(--border)}
.job-list-row{display:grid;grid-template-columns:1fr 160px 90px 110px 80px;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.job-list-row:last-child{border-bottom:none}
.job-list-row:hover{background:#f5f5f2}
.job-list-row.expanded{background:#f5f5f2}
.jlr-name{font-size:13px;font-weight:500;color:var(--black)}
.jlr-num{font-size:10px;color:var(--grey)}
.jlr-handler{font-size:12px;color:var(--grey)}
.jlr-val{font-size:12px;font-weight:500;color:var(--black);text-align:right}
.jlr-val.missing{color:var(--grey-mid);font-size:11px;font-weight:400;font-style:italic}

.job-row-detail{display:none;padding:12px 18px 14px;background:#f5f5f2;border-bottom:1px solid var(--border)}
.job-row-detail.open{display:block}
.jrd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}

/* LOADING / ERROR */
.loading{text-align:center;padding:5rem 0;color:var(--grey)}
.spinner{width:20px;height:20px;border:2px solid var(--grey-light);border-top-color:var(--black);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:4rem 0;color:var(--grey);font-size:14px}
.err{text-align:center;padding:4rem 0;color:var(--red)}

/* DATA GAP BANNER */
.gap-banner{display:flex;align-items:center;gap:12px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);border-radius:8px;padding:10px 16px;margin-bottom:1.5rem;font-size:12px;color:#7a5500}
.gap-banner a{color:#7a5500;font-weight:500}

@media(max-width:900px){
  .job-card-header{grid-template-columns:1fr auto}
  .job-card-header>*:nth-child(n+3):not(:last-child){display:none}
  .jobs-list-header,.job-list-row{grid-template-columns:1fr auto}
  .jobs-list-header>*:nth-child(n+3),.job-list-row>*:nth-child(n+3):not(:last-child){display:none}
  .detail-grid,.jrd-grid{grid-template-columns:1fr 1fr}
  .metrics{flex-wrap:wrap}
  .metric{min-width:50%}
  .ch-meta{display:none}
}

.focus-layout{display:grid;grid-template-columns:320px 1fr;gap:16px;align-items:start}
.focus-sidebar{display:flex;flex-direction:column;gap:10px}
.focus-section{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.focus-section-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#fafaf8}
.focus-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--grey)}
.focus-count{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.fc-red{background:rgba(255,77,77,.1);color:var(--red)}
.fc-amber{background:rgba(245,166,35,.1);color:#8a5500}
.fc-blue{background:rgba(74,144,217,.1);color:#185fa5}
.focus-item{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border)}
.focus-item:last-child{border-bottom:none}
.fi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.fi-dot.red{background:var(--red)}.fi-dot.amber{background:var(--amber)}.fi-dot.blue{background:var(--blue)}.fi-dot.grey{background:var(--grey-mid)}
.fi-body{flex:1;min-width:0}
.fi-name{font-size:12px;font-weight:500;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-client{font-size:11px;color:var(--grey);margin-top:1px}
.fi-meta{font-size:11px;font-weight:500;flex-shrink:0;text-align:right}
.fi-meta.red{color:var(--red)}.fi-meta.amber{color:#8a5500}.fi-meta.grey{color:var(--grey)}
.cal-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.cal-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#fafaf8}
.cal-title{font-size:14px;font-weight:500;letter-spacing:-.2px}
.wbtn{font-family:inherit;font-size:11px;padding:4px 10px;border:1px solid var(--border-strong);border-radius:6px;background:transparent;color:var(--grey);cursor:pointer;transition:all .12s}
.wbtn.active{background:var(--black);color:#fff;border-color:var(--black)}
.cal-day-header{display:grid;border-bottom:1px solid var(--border);background:#fafaf8}
.cal-day-col{padding:8px 6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--grey);border-right:1px solid var(--border);text-align:center}
.cal-day-col:last-child{border-right:none}
.cal-day-col.today-col{color:var(--black)}
.cal-row{display:grid;border-bottom:1px solid var(--border)}
.cal-row:last-child{border-bottom:none}
.cal-cell{padding:5px 6px;border-right:1px solid var(--border);min-height:72px}
.cal-cell:last-child{border-right:none}
.cal-cell.today-cell{background:rgba(139,255,87,.05)}
.cal-cell.past-cell{background:#fafaf8}
.cal-date{font-size:10px;font-weight:600;color:var(--grey);margin-bottom:3px}
.cal-date.today{color:var(--black)}
.cal-ev{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default}
.ev-live{background:#D8FFB8;color:#2A6000}
.ev-quote{background:#FFF0D0;color:#8A4500}
.ev-over{background:#FFE0E0;color:#8A0000}
.ev-risk{background:#FFF3C4;color:#7A5500}
.cal-cluster{font-size:10px;color:var(--grey);font-style:italic;margin-top:2px}
@media(max-width:900px){.focus-layout{grid-template-columns:1fr}}

/* GANTT */
.cal-view-toggle{display:flex;gap:4px}
.cal-view-btn{font-family:inherit;font-size:11px;padding:4px 10px;border:1px solid var(--border-strong);border-radius:6px;background:transparent;color:var(--grey);cursor:pointer;transition:all .12s}
.cal-view-btn.active{background:var(--black);color:#fff;border-color:var(--black)}
.gantt-wrap{overflow-x:auto}
.gantt-table{min-width:100%;border-collapse:collapse;font-size:11px}
.gantt-table th{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);padding:6px 8px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:center;background:#fafaf8;white-space:nowrap}
.gantt-table th.job-col{text-align:left;width:200px;position:sticky;left:0;background:#fafaf8;z-index:2}
.gantt-table th.client-col{text-align:left;width:140px;position:sticky;left:200px;background:#fafaf8;z-index:2}
.gantt-table td{padding:4px 8px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle}
.gantt-table td.job-name-col{font-weight:500;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;position:sticky;left:0;background:#fff;z-index:1;padding:6px 10px}
.gantt-table td.client-name-col{color:var(--grey);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;position:sticky;left:200px;background:#fff;z-index:1;padding:6px 10px}
.gantt-table tr:hover td{background:#fafaf8}
.gantt-table tr:hover td.job-name-col,.gantt-table tr:hover td.client-name-col{background:#fafaf8}
.gantt-table td.today-col-cell{background:rgba(139,255,87,0.04)}
.gantt-bar-cell{position:relative;min-width:28px;height:32px;padding:0}
.gantt-bar{position:absolute;top:50%;transform:translateY(-50%);height:16px;border-radius:3px;min-width:6px;transition:opacity .15s}
.gantt-bar:hover{opacity:.75;cursor:default}
.gantt-deadline{position:absolute;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;border:2px solid white;z-index:1}
.gantt-legend{display:flex;gap:14px;padding:10px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--grey);flex-wrap:wrap}
.gantt-legend span{display:flex;align-items:center;gap:4px}
.gantt-legend .swatch{width:10px;height:10px;border-radius:2px;display:inline-block}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">jungle<span>.</span>ops</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('pipeline',this)">Pipeline</button>
    <button class="nav-tab" onclick="switchTab('clients',this)">Existing clients</button>
    <button class="nav-tab" onclick="switchTab('focus',this)">Focus</button>
  </div>
  <div class="nav-right">
    <div class="live-badge"><div class="live-dot"></div>Synergist</div>
    <span class="last-sync" id="lastSync"></span>
    <a class="btn-ghost-sm" href="gaps.html">⚠ Data gaps</a>
    <button class="btn-sm" id="btnRefresh" onclick="loadAll()">↻ Refresh</button>
  </div>
</nav>

<div class="wrap">

  <!-- PIPELINE PANEL -->
  <div class="panel active" id="panel-pipeline">
    <div class="metrics" id="pipe-metrics">
      <div class="metric"><div class="metric-label">Loading</div><div class="metric-val">—</div></div>
    </div>
    <div class="gap-banner">
      ⚠ <span>Revenue values missing on all Quote jobs — <a href="gaps.html">see data gaps</a> for what to fix in Synergist.</span>
    </div>
    <div class="controls">
      <button class="pill active" onclick="setPipeFilter('all',this)">All</button>
      <button class="pill" onclick="setPipeFilter('Campaign',this)">Campaign</button>
      <button class="pill" onclick="setPipeFilter('Retainer',this)">Retainer</button>
      <button class="pill" onclick="setPipeFilter('(blank)',this)">Untagged</button>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#111110" stroke-width="1.2"/><line x1="9.5" y1="9.5" x2="12.5" y2="12.5" stroke="#111110" stroke-width="1.2" stroke-linecap="round"/></svg>
        <input class="search" type="text" id="pipeSearch" placeholder="Search clients or jobs…" oninput="renderPipeline()">
      </div>
    </div>
    <div id="pipelineList"><div class="loading"><div class="spinner"></div><br>Connecting to Synergist…</div></div>
  </div>

  <!-- CLIENTS PANEL -->
  <div class="panel" id="panel-clients">
    <div class="metrics" id="client-metrics">
      <div class="metric"><div class="metric-label">Loading</div><div class="metric-val">—</div></div>
    </div>
    <div class="controls">
      <button class="pill active" onclick="setClientFilter('all',this)">All</button>
      <button class="pill" onclick="setClientFilter('Retainer',this)">Retainers</button>
      <button class="pill" onclick="setClientFilter('Campaign',this)">Campaigns</button>
      <button class="pill" onclick="setClientFilter('(blank)',this)">Untagged</button>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#111110" stroke-width="1.2"/><line x1="9.5" y1="9.5" x2="12.5" y2="12.5" stroke="#111110" stroke-width="1.2" stroke-linecap="round"/></svg>
        <input class="search" type="text" id="clientSearch" placeholder="Search clients or jobs…" oninput="renderClients()">
      </div>
    </div>
    <div id="clientList"><div class="loading"><div class="spinner"></div><br>Connecting to Synergist…</div></div>
  </div>

  <!-- FOCUS PANEL -->
  <div class="panel" id="panel-focus">
    <div class="metrics" id="focus-metrics">
      <div class="metric"><div class="metric-label">Loading</div><div class="metric-val">—</div></div>
    </div>
    <div class="controls" style="margin-bottom:1.25rem">
      <span style="font-size:12px;color:var(--grey);margin-right:4px">Show:</span>
      <button class="wbtn active" onclick="setWeeks(1,this)">1 week</button>
      <button class="wbtn" onclick="setWeeks(2,this)">2 weeks</button>
      <button class="wbtn" onclick="setWeeks(3,this)">3 weeks</button>
      <button class="wbtn" onclick="setWeeks(4,this)">4 weeks</button>
    </div>
    <div class="focus-layout">
      <div class="focus-sidebar" id="focusSidebar">
        <div class="loading"><div class="spinner"></div></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:0">
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-bottom:8px">
          <button class="cal-view-btn active" id="cvGrid" onclick="setCalView('grid',this)">Calendar</button>
          <button class="cal-view-btn" id="cvGantt" onclick="setCalView('gantt',this)">Gantt</button>
        </div>
        <div class="cal-wrap" id="focusCal">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>


</div>

<script>
const SERVER = "https://junglecreations.synergist.cloud";
const USER   = "Coris.leachman";
const PASS   = "Jungle@123";

const EXCLUDE = new Set(["AGENCY INTERNAL - Non-Billable","MEDIA INTERNAL - Non-Bilable",
  "Jungle Creations Ltd","Creator - Media","Auto created internal organisation for external bookings"]);
const EXCL_P = [" - Media","Media Cross-Platform","Website - Media"];
function isInternal(n){ return EXCLUDE.has(n)||EXCL_P.some(p=>n.includes(p)); }

let QUOTE_JOBS = [], LIVE_JOBS = [];
let ACTIVITIES = {};   // jobNumber -> [activities]
let JOB_DETAILS = {};  // jobNumber -> detail object
let openCards = new Set();
let openClients = new Set();
let openJobRows = new Set();
let pipeFilter = 'all', clientFilter = 'all';
let currentTab = 'pipeline';

// ── API ──
async function syn(endpoint, params){
  const qp = new URLSearchParams({user:USER,password:PASS,version:"4",company:"1",...params});
  const r = await fetch(`${SERVER}/jsonapi/${endpoint}?${qp}`);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchAllJobs(){
  let all=[],page=1,total=null;
  while(true){
    const d = await syn("jobs.json",{modelstructure:"jobslist",style:"modeldata",rows:"200",page:String(page)});
    all=all.concat(d.data);
    if(total===null) total=d.totalrows;
    if(all.length>=total) break;
    page++;
  }
  return all;
}

// ── HELPERS ──
function fmt(n){ if(!n||n===0) return null; return '£'+Number(n).toLocaleString('en-GB',{maximumFractionDigits:0}); }
function fmtDate(d){
  if(!d||d==='0000-00-00') return null;
  try{ return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'}); }catch{return null;}
}
function daysUntil(d){
  if(!d||d==='0000-00-00') return null;
  return Math.ceil((new Date(d)-new Date())/86400000);
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function termType(j){ return j.jobCustomField19||'(blank)'; }
function safeId(s){ return s.replace(/[^a-zA-Z0-9]/g,'_'); }

function thermHtml(t,compact){
  if(!t) return compact?'<span style="font-size:10px;color:var(--grey)">—</span>':'';
  const pct=parseInt(t),cap=Math.min(pct,100);
  const cls=pct>=100?'danger':pct>=85?'warn':'';
  const col=pct>=100?'color:var(--red)':pct>=85?'color:var(--amber)':'';
  return `<div class="therm-wrap"><div class="therm-bar"><div class="therm-fill ${cls}" style="width:${cap}%"></div></div><span class="therm-pct" style="${col}">${pct}%</span></div>`;
}

function dueBadge(dateStr){
  const days=daysUntil(dateStr);
  const label=fmtDate(dateStr);
  if(!label) return '<span class="job-due" style="color:var(--grey-mid)">No date</span>';
  const cls=days!==null&&days<0?'overdue':days!==null&&days<=14?'soon':'';
  return `<span class="job-due ${cls}">${label}${days!==null&&days<0?' (overdue)':days!==null&&days<=7?' (this week)':''}</span>`;
}

function statusPill(s){
  const m={Live:'st-live',Quote:'st-quote','On-hold':'st-onhold'};
  return `<span class="status-pill ${m[s]||'st-quote'}">${esc(s)}</span>`;
}

// ── LOAD ──
async function loadAll(){
  const btn=document.getElementById('btnRefresh');
  btn.disabled=true; btn.textContent='↻ Loading…';
  document.getElementById('pipelineList').innerHTML='<div class="loading"><div class="spinner"></div><br>Fetching jobs…</div>';
  document.getElementById('clientList').innerHTML='<div class="loading"><div class="spinner"></div><br>Fetching jobs…</div>';

  try{
    const all = await fetchAllJobs();
    const active = all.filter(j=>!j.jobCompleted&&!isInternal(j.jobClientName||''));
    QUOTE_JOBS = active.filter(j=>j.jobStatusDescription==='Quote');
    LIVE_JOBS  = active.filter(j=>j.jobStatusDescription==='Live');

    const now = new Date();
    document.getElementById('lastSync').textContent =
      `Synced ${now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;

    openCards = new Set();
    openClients = new Set();
    openJobRows = new Set();
    JOB_DETAILS = {};
    ACTIVITIES = {};

    renderPipelineMetrics();
    renderPipeline();
    renderClientMetrics();
    renderClients();

  }catch(e){
    document.getElementById('pipelineList').innerHTML=`<div class="err">Could not load Synergist data.<br><small>${esc(e.message)}</small></div>`;
    document.getElementById('clientList').innerHTML=`<div class="err">Could not load Synergist data.<br><small>${esc(e.message)}</small></div>`;
  }finally{
    btn.disabled=false; btn.textContent='↻ Refresh';
  }
}

// ── PIPELINE ──
function renderPipelineMetrics(){
  const total=QUOTE_JOBS.length;
  const withVal=QUOTE_JOBS.filter(j=>j.jobCustomField6>0).length;
  const totalVal=QUOTE_JOBS.reduce((a,j)=>a+(j.jobCustomField6||0),0);
  const overdue=QUOTE_JOBS.filter(j=>daysUntil(j.jobDateDue)<0&&j.jobDateDue&&j.jobDateDue!=='0000-00-00').length;
  const dueSoon=QUOTE_JOBS.filter(j=>{const d=daysUntil(j.jobDateDue);return d!==null&&d>=0&&d<=14;}).length;

  document.getElementById('pipe-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total quotes</div><div class="metric-val"><strong>${total}</strong></div><div class="metric-sub">active opportunities</div></div>
    <div class="metric"><div class="metric-label">Pipeline value</div><div class="metric-val"><strong class="g">${totalVal>0?fmt(totalVal):'No data'}</strong></div><div class="metric-sub">${withVal} of ${total} have values</div></div>
    <div class="metric"><div class="metric-label">Due this fortnight</div><div class="metric-val"><strong class="g">${dueSoon}</strong></div><div class="metric-sub">need attention soon</div></div>
    <div class="metric"><div class="metric-label">Overdue</div><div class="metric-val"><strong class="${overdue>0?'r':'g'}">${overdue}</strong></div><div class="metric-sub">past due date</div></div>`;
}

function pipeFiltered(){
  const q=(document.getElementById('pipeSearch').value||'').toLowerCase();
  return QUOTE_JOBS.filter(j=>{
    const tt=termType(j);
    if(pipeFilter!=='all'&&tt!==pipeFilter) return false;
    if(!q) return true;
    return (j.jobClientName||'').toLowerCase().includes(q)||(j.jobDescription1stLine||'').toLowerCase().includes(q);
  });
}

function renderPipeline(){
  const jobs=pipeFiltered();
  const el=document.getElementById('pipelineList');
  if(!jobs.length){el.innerHTML='<div class="empty">No jobs match your filter.</div>';return;}

  el.innerHTML=jobs.map(j=>{
    const id=safeId(j.jobNumber);
    const isOpen=openCards.has(j.jobNumber);
    const val=fmt(j.jobCustomField6);
    const tt=termType(j);
    return `
    <div class="job-card ${isOpen?'open':''}" id="jc-${id}">
      <div class="job-card-header" data-job="${esc(j.jobNumber)}">
        <div class="job-name-cell">
          <div class="jname">${esc(j.jobDescription1stLine)}</div>
          <div class="jclient">${esc(j.jobClientName)}</div>
        </div>
        <div>
          <span class="status-pill st-quote">${esc(tt!=='(blank)'?tt:'Untagged')}</span>
        </div>
        <div class="job-value ${val?'':'missing'}">${val||'Value missing'}</div>
        <div class="job-handler">${esc(j.jobHandlerFullName||'—')}</div>
        ${dueBadge(j.jobDateDue)}
        <div class="chevron">
          <svg width="8" height="12" viewBox="0 0 8 12" fill="none"><path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="job-detail" id="jd-${id}">
        <div class="loading-detail" id="jdload-${id}">Loading details…</div>
      </div>
    </div>`;
  }).join('');
}

function setPipeFilter(f,el){
  pipeFilter=f;
  document.querySelectorAll('#panel-pipeline .pill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderPipeline();
}

// ── CLIENTS ──
function renderClientMetrics(){
  const allClientJobs=[...LIVE_JOBS,...QUOTE_JOBS].filter(j=>!isInternal(j.jobClientName||''));
  const live=LIVE_JOBS.length;
  const quotes=QUOTE_JOBS.length;
  const clients=new Set(allClientJobs.map(j=>j.jobClientName)).size;
  const over=LIVE_JOBS.filter(j=>parseInt(j.jobThermProgress)>=100).length;
  const atRisk=LIVE_JOBS.filter(j=>{const p=parseInt(j.jobThermProgress);return p>=85&&p<100;}).length;

  document.getElementById('client-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Clients</div><div class="metric-val"><strong>${clients}</strong></div><div class="metric-sub">with active jobs</div></div>
    <div class="metric"><div class="metric-label">Live jobs</div><div class="metric-val"><strong class="g">${live}</strong></div><div class="metric-sub">in delivery</div></div>
    <div class="metric"><div class="metric-label">Quotes</div><div class="metric-val"><strong>${quotes}</strong></div><div class="metric-sub">pending sign-off</div></div>
    <div class="metric"><div class="metric-label">Over budget</div><div class="metric-val"><strong class="${over>0?'r':'g'}">${over}</strong></div><div class="metric-sub">${atRisk} approaching limit</div></div>`;
}

function clientFiltered(){
  const q=(document.getElementById('clientSearch').value||'').toLowerCase();
  const byClient={};
  // Include both live and quote jobs per client for full picture
  const ALL_CLIENT_JOBS = [...LIVE_JOBS, ...QUOTE_JOBS];
  ALL_CLIENT_JOBS.forEach(j=>{
    const tt=termType(j);
    if(clientFilter!=='all'&&tt!==clientFilter) return;
    if(q&&!(j.jobClientName||'').toLowerCase().includes(q)&&!(j.jobDescription1stLine||'').toLowerCase().includes(q)) return;
    const c=j.jobClientName||'Unknown';
    if(!byClient[c]) byClient[c]=[];
    byClient[c].push(j);
  });
  // Sort jobs within each client: Live first, then Quote
  Object.values(byClient).forEach(jobs=>jobs.sort((a,b)=>{
    const order={Live:0,Quote:1,'On-hold':2};
    return (order[a.jobStatusDescription]??9)-(order[b.jobStatusDescription]??9);
  }));
  return Object.entries(byClient).sort(([a],[b])=>a.localeCompare(b));
}

function renderClients(){
  const clients=clientFiltered();
  const el=document.getElementById('clientList');
  if(!clients.length){el.innerHTML='<div class="empty">No clients match your filter.</div>';return;}

  el.innerHTML=clients.map(([clientName,jobs])=>{
    const cid=safeId(clientName);
    const isOpen=openClients.has(clientName);
    const totalVal=jobs.reduce((a,j)=>a+(j.jobCustomField6||0),0);
    const over=jobs.filter(j=>parseInt(j.jobThermProgress)>=100).length;

    return `
    <div class="client-block ${isOpen?'open':''}" id="cb-${cid}">
      <div class="client-header" data-client="${esc(clientName).replace(/"/g,'&quot;')}">
        <div class="ch-chevron"><svg width="8" height="12" viewBox="0 0 8 12" fill="none"><path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="ch-name">${esc(clientName)}</div>
        <div class="ch-meta">
          <div class="ch-stat"><strong>${jobs.length}</strong> job${jobs.length!==1?'s':''}</div>
          <div class="ch-stat"><strong>${jobs.filter(j=>j.jobStatusDescription==='Live').length}</strong> live</div>
          ${jobs.filter(j=>j.jobStatusDescription==='Quote').length?`<div class="ch-stat"><strong>${jobs.filter(j=>j.jobStatusDescription==='Quote').length}</strong> quote${jobs.filter(j=>j.jobStatusDescription==='Quote').length!==1?'s':''}</div>`:''}
          ${over?`<div class="ch-stat" style="color:var(--red)"><strong>${over}</strong> over budget</div>`:''}
        </div>
      </div>
      <div class="jobs-list">
        <div class="jobs-list-header"><span>Job</span><span>Handler</span><span>Status</span><span style="text-align:right">Budget used</span><span>Due</span></div>
        ${jobs.map(j=>{
          const jid=safeId(j.jobNumber);
          const isExpanded=openJobRows.has(j.jobNumber);
          return `
          <div class="job-list-row ${isExpanded?'expanded':''}" data-jrow="${esc(j.jobNumber)}">
            <div><div class="jlr-name">${esc(j.jobDescription1stLine)}</div><div class="jlr-num">${esc(j.jobNumber)}</div></div>
            <div class="jlr-handler">${esc(j.jobHandlerFullName||'—')}</div>
            <div>${statusPill(j.jobStatusDescription)}</div>
            <div>${thermHtml(j.jobThermProgress,true)}</div>
            ${dueBadge(j.jobDateDue)}
          </div>
          <div class="job-row-detail ${isExpanded?'open':''}" id="jrd-${jid}">
            <div class="loading-detail">Loading details…</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function setClientFilter(f,el){
  clientFilter=f;
  document.querySelectorAll('#panel-clients .pill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderClients();
}

// ── JOB DETAIL LOADER ──
async function loadJobDetail(jobNum, containerEl){
  if(JOB_DETAILS[jobNum]){
    renderJobDetail(JOB_DETAILS[jobNum], ACTIVITIES[jobNum]||[], containerEl);
    return;
  }
  try{
    const [detailRes, actRes] = await Promise.all([
      syn("jobs.json",{modelstructure:"jobdetails",style:"modeldata",jobnumber:jobNum}),
      syn("activities.json",{"job-number":jobNum,"rows":"20"})
    ]);
    JOB_DETAILS[jobNum] = detailRes.data[0]||{};
    ACTIVITIES[jobNum]  = actRes.data||[];
    renderJobDetail(JOB_DETAILS[jobNum], ACTIVITIES[jobNum], containerEl);
  }catch(e){
    containerEl.innerHTML=`<div style="font-size:12px;color:var(--red)">Failed to load details: ${esc(e.message)}</div>`;
  }
}

function renderJobDetail(d, acts, el){
  const val = fmt(d.jobQuotedPrice);
  const pipeline = d.jobOppCurrentStatus||'—';
  const weighting = d.jobOppWeighting ? d.jobOppWeighting+'%' : '—';
  const stage = d.jobCurrentStageDescription||'—';
  const team = d.jobTeamDescription||'—';
  const comments = d.jobComments||'';

  const actsHtml = acts.length===0
    ? '<div class="no-activities">No activities logged against this job.</div>'
    : acts.slice(0,8).map(a=>{
        const due=fmtDate(a.activityViewDate);
        const days=daysUntil(a.activityViewDate);
        const overdue=days!==null&&days<0&&!a.activityCompleted;
        return `<div class="activity-row">
          <div class="act-complete ${a.activityCompleted?'done':''}"></div>
          <div class="act-subject">${esc(a.activitySubject||'(no subject)')}</div>
          <div class="act-owner">${esc(a.activityOwnerName||'—')}</div>
          <div class="act-due ${overdue?'overdue':''}">${due||'No date'}</div>
        </div>`;
      }).join('');

  el.innerHTML=`
    <div class="detail-grid">
      <div class="detail-item"><div class="detail-label">Quoted value</div><div class="detail-val ${val?'':'muted'}">${val||'Not set'}</div></div>
      <div class="detail-item"><div class="detail-label">Pipeline status</div><div class="detail-val ${pipeline==='—'?'muted':''}">${esc(pipeline)}</div></div>
      <div class="detail-item"><div class="detail-label">Weighting</div><div class="detail-val">${esc(weighting)}</div></div>
      <div class="detail-item"><div class="detail-label">Current stage</div><div class="detail-val ${stage==='—'?'muted':''}">${esc(stage)}</div></div>
      <div class="detail-item"><div class="detail-label">Team</div><div class="detail-val">${esc(team)}</div></div>
      <div class="detail-item"><div class="detail-label">Job type</div><div class="detail-val">${esc(d.jobJobtypeDescription||'—')}</div></div>
      <div class="detail-item"><div class="detail-label">Start date</div><div class="detail-val">${fmtDate(d.jobDateIn)||'—'}</div></div>
      <div class="detail-item"><div class="detail-label">Due date</div><div class="detail-val">${fmtDate(d.jobDateDue)||'—'}</div></div>
    </div>
    ${comments?`<div style="font-size:12px;color:var(--grey);margin-bottom:12px;padding:10px 12px;background:var(--grey-light);border-radius:6px">${esc(comments)}</div>`:''}
    <div class="activities-section">
      <div class="activities-title">Activities / next actions</div>
      ${actsHtml}
    </div>`;
}

// ── EVENT DELEGATION ──
document.addEventListener('click', async function(e){
  // Pipeline card toggle
  const header = e.target.closest('.job-card-header');
  if(header){
    const jobNum = header.getAttribute('data-job');
    if(!jobNum) return;
    const card = header.closest('.job-card');
    const detailEl = card.querySelector('.job-detail');
    const isOpen = openCards.has(jobNum);
    if(isOpen){ openCards.delete(jobNum); card.classList.remove('open'); }
    else {
      openCards.add(jobNum);
      card.classList.add('open');
      await loadJobDetail(jobNum, detailEl);
    }
    return;
  }

  // Client header toggle
  const clientH = e.target.closest('.client-header');
  if(clientH){
    const name = clientH.getAttribute('data-client');
    if(!name) return;
    const block = clientH.closest('.client-block');
    if(openClients.has(name)){ openClients.delete(name); block.classList.remove('open'); }
    else{ openClients.add(name); block.classList.add('open'); }
    return;
  }

  // Job row toggle (existing clients)
  const jrow = e.target.closest('.job-list-row');
  if(jrow){
    const jobNum = jrow.getAttribute('data-jrow');
    if(!jobNum) return;
    const jid = safeId(jobNum);
    const detailEl = document.getElementById('jrd-'+jid);
    if(!detailEl) return;
    const isOpen = openJobRows.has(jobNum);
    if(isOpen){
      openJobRows.delete(jobNum);
      jrow.classList.remove('expanded');
      detailEl.classList.remove('open');
    } else {
      openJobRows.add(jobNum);
      jrow.classList.add('expanded');
      detailEl.classList.add('open');
      await loadJobDetail(jobNum, detailEl);
    }
    return;
  }
});

  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));

}



// ── CALENDAR VIEW TOGGLE ──
let calView = 'grid';

function setCalView(v, el) {
  calView = v;
  document.querySelectorAll('.cal-view-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderFocusCalendar();

// ── GANTT ──
function renderGantt() {
  const today = new Date(); today.setHours(0,0,0,0);
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((today.getDay()+6)%7));
  const cutoff = new Date(monday); cutoff.setDate(monday.getDate() + focusWeeks*7);
  const totalDays = focusWeeks * 7;

  // All jobs with a due date in or before the window (and started before cutoff)
  const jobs = [...LIVE_JOBS, ...QUOTE_JOBS]
    .filter(j => !isInternal(j.jobClientName||''))
    .filter(j => {
      const due = pd(j.jobDateDue);
      return due && due >= monday && due < cutoff;
    })
    .sort((a,b) => pd(a.jobDateDue) - pd(b.jobDateDue));

  if (!jobs.length) {
    document.getElementById('focusCal').innerHTML =
      '<div style="padding:3rem;text-align:center;color:var(--grey)">No jobs with due dates in this window.</div>';
    return;
  }

  // Build day columns
  const dayLabels = [];
  const weekBoundaries = []; // indices where a new week starts
  for (let i=0; i<totalDays; i++) {
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    if (i % 7 === 0) weekBoundaries.push(i);
    dayLabels.push(d);
  }

  const dayIdx = d => {
    const diff = Math.round((d - monday) / 86400000);
    return Math.max(0, Math.min(diff, totalDays));
  };

  const therm = j => parseInt(j.jobThermProgress||0);
  const barColour = j => {
    if (j.jobStatusDescription==='Quote') return '#F5A623';
    if (therm(j)>=100) return '#FF4D4D';
    if (therm(j)>=85) return '#F5A623';
    return '#8BFF57';
  };
  const barTextColour = j => {
    if (therm(j)>=85 || j.jobStatusDescription==='Quote') return '#5a3a00';
    return '#2A6000';
  };

  let html = `<div class="cal-head">
    <div class="cal-title">Gantt view — job due dates</div>
    <div style="font-size:11px;color:var(--grey)">${monday.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${new Date(cutoff-86400000).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
  </div>
  <div class="gantt-wrap"><table class="gantt-table">
  <thead><tr>
    <th class="job-col">Job</th>
    <th class="client-col">Client</th>`;

  // Week header spanning columns, then day headers
  // Build a two-row header: week label spanning 7 cols, then individual days
  // Just do day cols directly for simplicity
  dayLabels.forEach((d,i) => {
    const isT = d.toISOString().slice(0,10) === today.toISOString().slice(0,10);
    const isMon = i%7===0;
    const dayName = d.toLocaleDateString('en-GB',{weekday:'short'}).slice(0,1);
    const dateStr = d.getDate()+(isMon?` ${d.toLocaleDateString('en-GB',{month:'short'})}`:'');
    html += `<th style="${isT?'color:var(--black);font-weight:700':''} ${isMon&&i>0?'border-left:2px solid var(--border-strong)':''}">${isT?'●':dayName}<br>${dateStr}</th>`;
  });
  html += '</tr></thead><tbody>';

  jobs.forEach(j => {
    const due = pd(j.jobDateDue);
    const start = pd(j.jobDateIn);
    // Bar: from job start (or window start if before) to due date
    const startI = start && start > monday ? dayIdx(start) : 0;
    const endI   = dayIdx(due);
    const barLen = Math.max(1, endI - startI);
    const colour = barColour(j);

    html += `<tr>
      <td class="job-name-col" title="${esc(j.jobDescription1stLine)}">${esc(j.jobDescription1stLine.length>28?j.jobDescription1stLine.slice(0,28)+'…':j.jobDescription1stLine)}</td>
      <td class="client-name-col" title="${esc(j.jobClientName)}">${esc(j.jobClientName.length>18?j.jobClientName.slice(0,18)+'…':j.jobClientName)}</td>`;

    dayLabels.forEach((d,i) => {
      const isT = d.toISOString().slice(0,10) === today.toISOString().slice(0,10);
      const isMon = i%7===0;
      const cellStyle = `${isT?'background:rgba(139,255,87,0.06);':''}${isMon&&i>0?'border-left:2px solid var(--border-strong);':''}`;

      if (i === startI) {
        // Bar starts here — use colspan for the bar width
        const isDeadline = (i === endI);
        html += `<td class="gantt-bar-cell" colspan="${barLen}" style="${cellStyle}">
          <div class="gantt-bar" style="background:${colour};left:4px;right:${isDeadline?'4px':'2px'};opacity:0.85;" title="${esc(j.jobClientName+': '+j.jobDescription1stLine)} — due ${due.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}"></div>
          ${isDeadline?`<div class="gantt-deadline" style="right:4px;background:${colour};border-color:#fff;"></div>`:''}
        </td>`;
        // skip ahead by barLen-1
        // We need to track position — handled by colspan
      } else if (i > startI && i <= endI) {
        // Skip — covered by colspan
      } else if (i === endI && endI !== startI) {
        // Deadline marker
        html += `<td class="gantt-bar-cell" style="${cellStyle}">
          <div class="gantt-deadline" style="right:4px;background:${colour};left:50%;transform:translate(-50%,-50%);top:50%;"></div>
        </td>`;
      } else {
        html += `<td class="gantt-bar-cell" style="${cellStyle}"></td>`;
      }
    });

    html += '</tr>';
  });

  html += `</tbody></table></div>
  <div class="gantt-legend">
    <span><span class="swatch" style="background:#8BFF57"></span>Live — on track</span>
    <span><span class="swatch" style="background:#F5A623"></span>At risk / Quote</span>
    <span><span class="swatch" style="background:#FF4D4D"></span>Over budget</span>
    <span style="color:var(--grey)">Bars run from job start date to due date. ● = today.</span>
  </div>`;

  document.getElementById('focusCal').innerHTML = html;
}

// ── FOCUS ──
let focusWeeks = 1;

function setWeeks(n, el) {
  focusWeeks = n;
  document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderFocus();
}

function pd(s) { // parseDate
  if (!s || s === '0000-00-00') return null;
  try { const d = new Date(s); d.setHours(0,0,0,0); return isNaN(d.getTime()) ? null : d; } catch { return null; }
}

function renderFocusMetrics() {
  const today = new Date(); today.setHours(0,0,0,0);
  const cutoff28 = new Date(today); cutoff28.setDate(today.getDate()+28);
  const sixtyAgo = new Date(today); sixtyAgo.setDate(today.getDate()-60);
  const allExternal = j => !isInternal(j.jobClientName||'');

  const upcoming  = [...LIVE_JOBS,...QUOTE_JOBS].filter(allExternal).filter(j=>{const d=pd(j.jobDateDue);return d&&d>=today&&d<=cutoff28;});
  const overdue   = [...LIVE_JOBS,...QUOTE_JOBS].filter(allExternal).filter(j=>{const d=pd(j.jobDateDue);return d&&d<today&&d>sixtyAgo;});
  const overBudget= LIVE_JOBS.filter(allExternal).filter(j=>parseInt(j.jobThermProgress||0)>=100);
  const atRisk    = LIVE_JOBS.filter(allExternal).filter(j=>{const p=parseInt(j.jobThermProgress||0);return p>=85&&p<100;});

  document.getElementById('focus-metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Due in 4 weeks</div><div class="metric-val"><strong>${upcoming.length}</strong></div><div class="metric-sub">approaching deadline</div></div>
    <div class="metric"><div class="metric-label">Recently overdue</div><div class="metric-val"><strong class="${overdue.length?'r':'g'}">${overdue.length}</strong></div><div class="metric-sub">within past 60 days</div></div>
    <div class="metric"><div class="metric-label">Over budget</div><div class="metric-val"><strong class="${overBudget.length?'r':'g'}">${overBudget.length}</strong></div><div class="metric-sub">live jobs exceeded</div></div>
    <div class="metric"><div class="metric-label">At risk</div><div class="metric-val"><strong class="${atRisk.length?'r':'g'}">${atRisk.length}</strong></div><div class="metric-sub">85–99% budget used</div></div>`;
}

function renderFocusSidebar() {
  const today = new Date(); today.setHours(0,0,0,0);
  const cutoff = new Date(today); cutoff.setDate(today.getDate()+focusWeeks*7);
  const sixtyAgo = new Date(today); sixtyAgo.setDate(today.getDate()-60);
  const ext = j => !isInternal(j.jobClientName||'');

  const overBudget = LIVE_JOBS.filter(ext).filter(j=>parseInt(j.jobThermProgress||0)>=100)
    .sort((a,b)=>parseInt(b.jobThermProgress||0)-parseInt(a.jobThermProgress||0));
  const atRisk = LIVE_JOBS.filter(ext).filter(j=>{const p=parseInt(j.jobThermProgress||0);return p>=85&&p<100;})
    .sort((a,b)=>parseInt(b.jobThermProgress||0)-parseInt(a.jobThermProgress||0));
  const upcoming = [...LIVE_JOBS,...QUOTE_JOBS].filter(ext)
    .filter(j=>{const d=pd(j.jobDateDue);return d&&d>=today&&d<=cutoff;})
    .sort((a,b)=>pd(a.jobDateDue)-pd(b.jobDateDue));
  const overdue = [...LIVE_JOBS,...QUOTE_JOBS].filter(ext)
    .filter(j=>{const d=pd(j.jobDateDue);return d&&d<today&&d>sixtyAgo;})
    .sort((a,b)=>pd(b.jobDateDue)-pd(a.jobDateDue));

  const daysLabel = dateStr => {
    const d = pd(dateStr); if(!d) return '—';
    const diff = Math.ceil((d-today)/86400000);
    if(diff===0) return 'Today';
    if(diff===1) return 'Tomorrow';
    if(diff<0) return Math.abs(diff)+'d ago';
    return 'in '+diff+'d';
  };

  const item = (j, dotCls, meta, metaCls) =>
    `<div class="focus-item"><div class="fi-dot ${dotCls}"></div><div class="fi-body"><div class="fi-name">${esc(j.jobDescription1stLine)}</div><div class="fi-client">${esc(j.jobClientName)} · ${esc(j.jobHandlerFullName||'—')}</div></div><div class="fi-meta ${metaCls}">${meta}</div></div>`;

  const section = (title, items, fcCls, fn) => !items.length ? '' :
    `<div class="focus-section"><div class="focus-section-head"><div class="focus-section-title">${title}</div><span class="focus-count ${fcCls}">${items.length}</span></div>${items.slice(0,6).map(fn).join('')}${items.length>6?`<div style="padding:8px 16px;font-size:11px;color:var(--grey)">+${items.length-6} more</div>`:''}</div>`;

  const html =
    section('Over budget', overBudget, 'fc-red', j=>item(j,'red',j.jobThermProgress,'red'))+
    section('At risk', atRisk, 'fc-amber', j=>item(j,'amber',j.jobThermProgress,'amber'))+
    section('Due this window', upcoming, 'fc-blue', j=>item(j,'blue',daysLabel(j.jobDateDue),'grey'))+
    section('Recently overdue', overdue, 'fc-red', j=>item(j,'red',daysLabel(j.jobDateDue),'red'));

  document.getElementById('focusSidebar').innerHTML = html ||
    '<div class="focus-section"><div style="padding:2rem;text-align:center;color:var(--grey);font-size:13px">Nothing flagged for this period.</div></div>';
}

function renderFocusCalendar() {
  if (calView === 'gantt') { renderGantt(); return; }
  const today = new Date(); today.setHours(0,0,0,0);
  // Start Monday of current week
  const monday = new Date(today);
  monday.setDate(today.getDate()-((today.getDay()+6)%7));
  const cutoff = new Date(monday); cutoff.setDate(monday.getDate()+focusWeeks*7);

  // Build date->jobs map
  const evMap = {};
  [...LIVE_JOBS,...QUOTE_JOBS].filter(j=>!isInternal(j.jobClientName||'')).forEach(j=>{
    const d = pd(j.jobDateDue);
    if(!d||d<monday||d>=cutoff) return;
    const k = d.toISOString().slice(0,10);
    if(!evMap[k]) evMap[k]=[];
    evMap[k].push(j);
  });

  const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const isToday = d => d.toISOString().slice(0,10)===today.toISOString().slice(0,10);
  const isPast  = d => d < today && !isToday(d);
  const therm   = j => parseInt(j.jobThermProgress||0);
  const evCls   = j => j.jobStatusDescription==='Quote'?'ev-quote':therm(j)>=100?'ev-over':therm(j)>=85?'ev-risk':'ev-live';

  // Build weeks array
  const weeks = [];
  let cur = new Date(monday);
  while(cur<cutoff){
    const wk=[];
    for(let i=0;i<7;i++){wk.push(new Date(cur));cur.setDate(cur.getDate()+1);}
    weeks.push(wk);
  }

  const shortName = s => s.length>13?s.slice(0,13)+'…':s;

  let html = `<div class="cal-head"><div class="cal-title">Activity calendar — job due dates</div><div style="font-size:11px;color:var(--grey)">${monday.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${new Date(cutoff-86400000).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div></div>`;

  // Header row
  html += `<div class="cal-day-header" style="grid-template-columns:repeat(7,1fr)">`;
  for(let i=0;i<7;i++){
    const d=new Date(monday); d.setDate(monday.getDate()+i);
    html+=`<div class="cal-day-col ${isToday(d)?'today-col':''}">${DAY_NAMES[i]}</div>`;
  }
  html += '</div>';

  // Week rows
  weeks.forEach(week=>{
    html+=`<div class="cal-row" style="grid-template-columns:repeat(7,1fr)">`;
    week.forEach(d=>{
      const k=d.toISOString().slice(0,10);
      const evs=evMap[k]||[];
      const isCluster=evs.length>=5;
      html+=`<div class="cal-cell ${isToday(d)?'today-cell':''} ${isPast(d)?'past-cell':''}">`;
      html+=`<div class="cal-date ${isToday(d)?'today':''}">${d.getDate()} ${d.toLocaleDateString('en-GB',{month:'short'})}</div>`;
      if(isCluster){
        const liveN=evs.filter(j=>j.jobStatusDescription==='Live').length;
        const quoteN=evs.filter(j=>j.jobStatusDescription==='Quote').length;
        if(liveN) html+=`<div class="cal-ev ev-live">${liveN} live jobs</div>`;
        if(quoteN) html+=`<div class="cal-ev ev-quote">${quoteN} quotes</div>`;
        html+=`<div class="cal-cluster">⚠ Likely placeholder</div>`;
      } else {
        evs.forEach(j=>{
          html+=`<div class="cal-ev ${evCls(j)}" title="${esc(j.jobClientName+': '+j.jobDescription1stLine)}">${esc(shortName(j.jobClientName))}</div>`;
        });
      }
      html+='</div>';
    });
    html+='</div>';
  });

  // Legend
  html+=`<div style="display:flex;gap:14px;padding:10px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--grey);flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#D8FFB8;display:inline-block"></span>Live</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#FFF0D0;display:inline-block"></span>Quote</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#FFF3C4;display:inline-block"></span>At risk</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#FFE0E0;display:inline-block"></span>Over budget</span>
  </div>`;

  document.getElementById('focusCal').innerHTML = html;
}

function renderFocus() {
  if(!LIVE_JOBS.length && !QUOTE_JOBS.length) return;
  renderFocusMetrics();
  renderFocusSidebar();
  renderFocusCalendar();
}

// ── INIT ──
loadAll();
</script>
